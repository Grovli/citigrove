name: store-api ci

# Lint + AST + pytest for the store-api (citigrove monorepo). Path-scoped so it
# only runs when store-api/ changes.
on:
  push:
    branches: [main]
    paths: ["store-api/**", ".github/workflows/store-api-ci.yml"]
  pull_request:
    paths: ["store-api/**", ".github/workflows/store-api-ci.yml"]

concurrency:
  group: store-api-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: store-api

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        env:
          PIP_CONSTRAINT: ${{ github.workspace }}/store-api/otel-constraints.txt
        run: |
          python -m pip install --upgrade pip
          # Prefer the committed lock; fall back to requirements.txt until the
          # lock is regenerated with `uv pip compile requirements.in -o requirements.lock`.
          pip install -r requirements.lock || pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: AST / compile gate
        run: python -m compileall -q app tests

      - name: Pytest
        run: pytest
