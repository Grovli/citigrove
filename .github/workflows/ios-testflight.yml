name: iOS — TestFlight (CitiGrove)

# Manual only — never auto-deploy on push (it would spam TestFlight + burn App
# Store Connect review slots). Adapted from Grovli's ios-testflight.yml, with the
# backend app_version lock-step REMOVED (citigrove has no backend) and the
# identity re-templated (bundle com.citigrove.app, scheme CitiGrove). The project
# is generated by xcodegen from mobile/project.yml, so CI runs `xcodegen generate`
# and regenerates the placeholder icon before archiving.

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (e.g. 1.0). Empty = rebuild the current pbxproj version."
        required: false
      build_number:
        description: "Build number. Empty = github.run_number + 100."
        required: false

concurrency:
  group: citigrove-ios-testflight
  cancel-in-progress: true

permissions:
  contents: read

env:
  SCHEME: CitiGrove
  PROJECT: mobile/CitiGrove.xcodeproj
  ARCHIVE_PATH: mobile/build/CitiGrove.xcarchive
  EXPORT_PATH: mobile/build/export
  EXPORT_OPTIONS: mobile/ExportOptions.plist
  ASC_KEY_ID: 9TSUUZ83Y7
  DEVELOPMENT_TEAM: 3U53SJ48WZ

jobs:
  testflight:
    name: Archive & upload
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -switch /Applications/Xcode_26.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate placeholder app icon
        working-directory: mobile
        run: swift scripts/generate_app_icon.swift CitiGrove/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png

      - name: Generate Xcode project
        working-directory: mobile
        run: xcodegen generate

      - name: Install App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_API_KEY_BASE64 }}" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Resolve versions
        id: ver
        run: |
          BUILD_NUMBER="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER=$(( ${{ github.run_number }} + 100 )); fi
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "marketing=${{ github.event.inputs.marketing_version }}" >> "$GITHUB_OUTPUT"

      - name: Archive
        run: |
          MV_FLAG=""
          if [ -n "${{ steps.ver.outputs.marketing }}" ]; then
            MV_FLAG="MARKETING_VERSION=${{ steps.ver.outputs.marketing }}"
          fi
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CURRENT_PROJECT_VERSION=${{ steps.ver.outputs.build }} $MV_FLAG \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            archive

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            --file "$EXPORT_PATH/CitiGrove.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"
