name: Deploy to Firebase

on:
  push:
    branches:
      - main
  # Manual trigger — republish the static export after a document-api content
  # change (re-seed) without needing a code change. `gh workflow run deploy.yml`.
  workflow_dispatch:
  # Automated trigger — document-api's deploy fires this after seeding +
  # publishing new CitiGrove Journal posts, so the static blog goes live
  # without a manual rebuild. (See document-api deploy.yml `publish` job.)
  repository_dispatch:
    types: [journal-published]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Next.js (static export → ./out)
        run: npm run build
        env:
          NEXT_PUBLIC_GCS_BUCKET_URL: https://storage.googleapis.com/citigrove-images
          NEXT_PUBLIC_SITE_URL: https://citigrove.com
          # Public document-api (headless CMS) the blog is statically generated
          # from at build. grovli-document-api-public — NOT api.grovli.citigrove.com
          # (that's grovli-backend and 404s on /public/*). Override via repo secret.
          DOCUMENT_API_URL: ${{ secrets.DOCUMENT_API_URL || 'https://grovli-document-api-public-uyply7jkca-uc.a.run.app' }}

      - name: Deploy to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            npx firebase-tools deploy --only functions,hosting:site \
              --project organic-spirit-488116-e2 \
              --non-interactive --force
          rm -f /tmp/sa.json
